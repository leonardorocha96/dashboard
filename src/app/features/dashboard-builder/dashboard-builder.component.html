<div class="dashboard-builder">
  <aside class="sidebar">
    <app-widget-palette
      [items]="paletteItems"
      [dragGroup]="dragGroup"
      (addWidget)="addWidgetFromPalette($event)"
    ></app-widget-palette>
  </aside>

  <section class="workspace">
    <header class="workspace__header">
      <div>
        <h1>Dashboard Builder</h1>
        <p>Arraste widgets da paleta, reordene e personalize o layout.</p>
      </div>
      <div class="workspace__actions">
        <button class="dashboard-btn dashboard-btn--primary" type="button" (click)="saveLayout()">
          Salvar layout
        </button>
        <button class="dashboard-btn dashboard-btn--secondary" type="button" (click)="resetLayout()">
          Redefinir
        </button>
      </div>
    </header>

    <div class="canvas-container">
      <div class="canvas" #canvas>
        <div *ngFor="let widget of widgets; trackBy: trackByWidgetId" 
             class="canvas__item" 
             [style.left.px]="widget.position?.x" 
             [style.top.px]="widget.position?.y"
             [style.position]="'absolute'"
             (mousedown)="onWidgetMouseDown($event, widget)"
             (dragstart)="$event.preventDefault()">
          <app-widget-card
            [widget]="widget"
            [selected]="widget.id === selectedWidgetId"
            (select)="selectWidget(widget.id)"
            (remove)="removeWidget(widget.id)"
            (configure)="openConfig(widget.id)"
            (resize)="resizeWidget(widget.id, $event)">
          </app-widget-card>
        </div>
      </div>

      <div class="canvas__empty" *ngIf="widgets.length === 0">
        <p>Arraste widgets da paleta para iniciar um novo dashboard.</p>
        <button class="dashboard-btn dashboard-btn--primary" type="button" (click)="addWidgetFromPalette('line')">
          Adicionar gráfico de linha
        </button>
      </div>
    </div>
  </section>

  <app-widget-config-drawer
    [widget]="activeWidget"
    [palettes]="paletteOptions"
    (close)="closeConfig()"
    (update)="applyWidgetConfig($event)"
    (randomizeData)="refreshData()"
    (changeDataSet)="changeDataSet($event)"
  ></app-widget-config-drawer>
</div>
