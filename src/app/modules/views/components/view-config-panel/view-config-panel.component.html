<section class="view-config" *ngIf="component">
  <h3>Configuração de View</h3>
  <form [formGroup]="form">
    <label>
      Modo
      <select formControlName="mode">
        <option value="analysis">Análise</option>
        <option value="catalog">Cadastro</option>
        <option value="sql">SQL</option>
      </select>
    </label>
    <label>
      Fonte / Tabela / Endpoint
      <input type="text" formControlName="source" />
    </label>
    <label *ngIf="form.value.mode !== 'sql'">
      Dimensões (separadas por vírgula)
      <input type="text" formControlName="dimensions" />
    </label>
    <label *ngIf="form.value.mode === 'analysis'">
      Métricas (separadas por vírgula)
      <input type="text" formControlName="measures" />
    </label>
    <label *ngIf="form.value.mode === 'sql'">
      QueryId
      <input type="text" formControlName="queryId" />
    </label>
  </form>
</section>
