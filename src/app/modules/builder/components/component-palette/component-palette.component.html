<section class="palette">
  <header>
    <h2>Componentes</h2>
    <small>Arraste para a tela para adicionar.</small>
  </header>

  <div class="palette-grid">
    <article
      *ngFor="let item of components"
      cdkDrag
      [cdkDragData]="item"
      class="palette-card"
    >
      <span class="material-symbols-rounded">{{ item.icon }}</span>
      <div>
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </div>
    </article>
  </div>
</section>
