<section class="filter-config">
  <header>
    <h2>Barra de Filtros</h2>
    <button type="button" (click)="addFilter()">
      <span class="material-symbols-rounded">add</span>
      Novo filtro
    </button>
  </header>

  <form [formGroup]="filtersForm">
    <div class="filter-row" *ngFor="let filter of filters.controls" [formGroup]="filter">
      <input formControlName="label" placeholder="Nome do filtro" />
      <input formControlName="dimension" placeholder="Dimensão" />
      <select formControlName="component">
        <option value="text">Texto</option>
        <option value="number">Número</option>
        <option value="dateRange">Intervalo</option>
        <option value="checkbox">Checkbox</option>
        <option value="multiSelect">MultiSelect</option>
        <option value="selector">Seletor</option>
      </select>
      <input formControlName="primaryColor" type="color" />
      <input formControlName="secondaryColor" type="color" />
      <label>
        <input type="checkbox" formControlName="waitForApply" /> Esperar aplicar
      </label>
    </div>
  </form>

  <footer>
    <button type="button" class="primary" (click)="save()">Salvar filtros</button>
  </footer>
</section>
