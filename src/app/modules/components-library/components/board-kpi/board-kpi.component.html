<div class="kpi-card" (click)="triggerDetails()">
  <div class="kpi-header">
    <span class="kpi-icon material-symbols-rounded">
      {{ ctx.component.metadata?.icon || 'insights' }}
    </span>
    <div class="kpi-meta">
      <span class="kpi-title">{{ ctx.component.title }}</span>
      <span class="kpi-target">Meta: {{ target | number: '1.0-0' }}</span>
    </div>
  </div>
  <div class="kpi-value">{{ primaryValue | number: '1.0-0' }}</div>
  <div class="kpi-variation" [class.positive]="variation >= 0" [class.negative]="variation < 0">
    <span class="material-symbols-rounded">trending_{{ variation >= 0 ? 'up' : 'down' }}</span>
    {{ variation | number: '1.0-1' }}%
  </div>
</div>
