<nav class="side-nav">
  <button
    *ngFor="let item of items"
    type="button"
    class="side-nav__item"
    [class.side-nav__item--active]="item.id === activeItemId"
    (click)="onSelect(item)"
  >
    <span class="material-symbols-outlined">{{ item.icon }}</span>
    <span class="side-nav__label">{{ item.label }}</span>
  </button>
</nav>
